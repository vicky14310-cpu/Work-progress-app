name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create configs
        run: |
          echo '{"appId":"com.work.progress","appName":"Work Progress","webDir":"www"}' > capacitor.config.json
          echo '{"name":"work-progress-app","version":"1.0.0","dependencies":{"@capacitor/android":"5.5.1","@capacitor/core":"5.5.1"},"devDependencies":{"@capacitor/cli":"5.5.1"}}' > package.json
          mkdir -p www && cp index.html www/
      - run: npm install
      - run: rm -rf android && npx cap add android
      - run: npx cap sync
      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Work-Progress-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
